<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indizio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0b07;
      font-family: 'Georgia', serif;
      color: #f0ddb0;
    }

    .card {
      max-width: 480px;
      width: 90%;
      text-align: center;
      padding: 48px 40px;
      border: 1px solid #5a3e1b;
      border-radius: 4px;
      background: #1a1208;
      box-shadow: 0 0 60px rgba(180, 100, 20, 0.15);
    }

    .flame {
      font-size: 2.4rem;
      margin-bottom: 28px;
      animation: flicker 2.5s ease-in-out infinite alternate;
    }

    @keyframes flicker {
      0%   { opacity: 1; transform: scale(1); }
      50%  { opacity: 0.75; transform: scale(0.97); }
      100% { opacity: 1; transform: scale(1.03); }
    }

    .clue {
      font-size: 1.25rem;
      line-height: 1.8;
      color: #f0ddb0;
      margin-bottom: 40px;
      font-style: italic;
    }

    .divider {
      border: none;
      border-top: 1px solid #3a2a0e;
      margin: 0 auto 32px;
      width: 60%;
    }

    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #9a7a40;
      margin-bottom: 12px;
    }

    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      background: #0e0b07;
      border: 1px solid #5a3e1b;
      border-radius: 3px;
      color: #f0ddb0;
      font-size: 1rem;
      font-family: inherit;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input[type="text"]:focus {
      border-color: #c8872a;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #7a4a10;
      border: none;
      border-radius: 3px;
      color: #f0ddb0;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #a05e18; }
    button:disabled { opacity: 0.5; cursor: default; }

    .message {
      margin-top: 20px;
      font-size: 0.9rem;
      min-height: 22px;
      color: #e07030;
      letter-spacing: 0.04em;
    }

    /* stato: già utilizzato */
    .used-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .used-screen .icon { font-size: 2.5rem; }

    .used-screen h2 {
      font-size: 1.3rem;
      color: #c05020;
      letter-spacing: 0.08em;
    }

    .used-screen p {
      font-size: 0.9rem;
      color: #7a5a30;
      line-height: 1.6;
    }

    /* stato: successo */
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .success-screen .icon { font-size: 2.5rem; }

    .success-screen h2 {
      font-size: 1.3rem;
      color: #80c840;
      letter-spacing: 0.06em;
    }

    .success-screen p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #c8a860;
    }
  </style>
</head>
<body>
  <div class="card" id="puzzle-screen">
    <div class="flame">&#x1F525;</div>
    <p class="clue">
      Il vostro nome dice già dove dovete andare.<br>
      Seguite il profumo del porco.
    </p>
    <hr class="divider" />
    <label for="word-input">Inserite la parola segreta</label>
    <input type="text" id="word-input" placeholder="..." autocomplete="off" />
    <button id="submit-btn" onclick="submitWord()">Conferma</button>
    <div class="message" id="msg"></div>
  </div>

  <div class="card used-screen" id="used-screen">
    <div class="icon">&#x26D4;</div>
    <h2>Già utilizzato</h2>
    <p>Qualcuno è passato di qui prima di voi.<br>La caccia continua altrove.</p>
  </div>

  <div class="card success-screen" id="success-screen">
    <div class="icon">&#x2705;</div>
    <h2>Indizio sbloccato!</h2>
    <p>Bene. Ora sapete dove andare.<br>Muovetevi — il profumo non dura per sempre.</p>
  </div>

  <script>
    async function init() {
      const res = await fetch('/api/status');
      const data = await res.json();
      if (data.used) showUsed();
    }

    function showUsed() {
      document.getElementById('puzzle-screen').style.display = 'none';
      document.getElementById('used-screen').style.display = 'flex';
    }

    function showSuccess() {
      document.getElementById('puzzle-screen').style.display = 'none';
      document.getElementById('success-screen').style.display = 'flex';
    }

    async function submitWord() {
      const word = document.getElementById('word-input').value;
      const btn = document.getElementById('submit-btn');
      const msg = document.getElementById('msg');

      if (!word.trim()) return;

      btn.disabled = true;
      msg.textContent = '';

      const res = await fetch('/api/redeem', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ word })
      });
      const data = await res.json();

      if (data.success) {
        showSuccess();
      } else if (data.reason === 'already_used') {
        showUsed();
      } else {
        msg.textContent = 'Parola errata. Riprovate.';
        btn.disabled = false;
      }
    }

    document.getElementById('word-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitWord();
    });

    init();
  </script>
</body>
</html>
